# 📥 WORKFLOW LẤY FILE KSU MANAGER & SUSFS MODULE
# 👑 Việt hóa & Tối ưu bởi: p0s3id0n
# ========================================

name: 📥 Tải Manager & SUSFS

# ⚙️ Tương thích Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

on:
  workflow_call:
    outputs:
      susVer:
        description: "Bản SUSFS module fetch được"
        value: ${{ jobs.get_ksu_manager.outputs.susVer }}

      ksuVer:
        description: "Bản APK KSU tính toán ra"
        value: ${{ jobs.get_ksu_manager.outputs.ksuVer }}

jobs:
  get_ksu_manager:
    runs-on: ubuntu-latest
    outputs:
      ksuVer: ${{ steps.get_version.outputs.kversion }}
      susVer: ${{ steps.get_version.outputs.sversion }}
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 🧐 Trích Xuất Dữ Liệu Gọi Workflow (Debug)
        run: |
          echo "==================== 🕵️ THÔNG TIN DEBUG ===================="
          echo " "
          echo "🚨 EVENT NAME: ${{ github.event_name }}"
          echo " "
          echo "--- 📞 THÔNG TIN CUỘC GỌI ---"
          echo "  - Repo gọi lệnh : ${{ github.caller_repository }}"
          echo "  - Tên Workflow  : ${{ github.caller_workflow }}"
          echo "  - User trigger  : ${{ github.triggering_actor }}"
          echo " "
          echo "--- 🖥️ THÔNG TIN JOB ---"
          echo "  - File Workflow : ${{ github.workflow }}"
          echo "  - Job ID        : ${{ github.job }}"
          echo "  - Run ID        : ${{ github.run_id }}"
          echo "  - Số hiệu       : ${{ github.run_number }}"
          echo " "
          echo "============================================================"
          
      - name: 🛠️ Cài Đặt Tools Hỗ Trợ
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl jq

      - name: 🔍 Lấy Ver Của KSU & SUSFS
        id: get_version
        run: |
          echo "📱 Đang lấy biến thể ReSukiSU..."
          git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU

          cd KernelSU
          KSU_GIT_VERSION=$(git rev-list --count HEAD)
          KSU_VERSION=$((30700 + KSU_GIT_VERSION))
          echo "✨ Ver KSU tính toán ra: $KSU_VERSION"
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

          INFO="https://gitlab.com/simonpunk/susfs4ksu/-/raw/gki-android14-6.1/ksu_module_susfs/module.prop\?ref_type\=heads"
          SUS_VERSION=$(curl -s $INFO | awk -F '=' '$1 == "version" { print $2 }')
          echo "✨ Ver SUSFS lấy được: $SUS_VERSION"

          echo "kversion=$KSU_VERSION" >> $GITHUB_OUTPUT
          echo "sversion=$SUS_VERSION" >> $GITHUB_OUTPUT

      - name: ⬇️ Tải APK KernelSU Manager Mới Nhất
        id: add_KSU
        continue-on-error: true
        run: |
          echo "🤖 Quét CI của repo ReSukiSU..."
          REPO="ReSukiSU/ReSukiSU"
          KSUM="Manager"
          FILENAME="build-manager.yml"
          NUMBER=0
          DOWNLOAD_LIST=""

          echo "🔎 Đang lùng sục file Artifact Manager..."
          while true; do
            echo "--------------------------------------------------"
            echo "Đang check bản build thành công số thứ ${NUMBER}..."
            if [ "$NUMBER" -ge 9 ]; then echo "❌ Quét 9 bản rồi không có. Bó tay!"; break; fi

            BUILD_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/actions/workflows/$FILENAME/runs?status=success" | jq -r '.workflow_runs['"$NUMBER"'].id')
            echo "🔗 ID Build phát hiện: $BUILD_ID"

            ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/actions/runs/$BUILD_ID/artifacts")
            result=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | contains("'"$KSUM"'")) | .name')

            if [ -z "$result" ]; then
              echo "⏭️ Chưa thấy bóng dáng chữ '$KSUM', chuyển qua build cũ hơn."
              NUMBER=$((NUMBER + 1))
            else
              echo "🎉 Đã bắt được file: $result"
              DOWNLOAD_LIST=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | contains("'"$KSUM"'")) | "\(.name)\t\(.archive_download_url)"')
              break
            fi
          done
         
          if [ -z "$DOWNLOAD_LIST" ]; then echo "❌ Lỗi: Không bắt được link down Manager."; exit 1; fi
          
          echo "$DOWNLOAD_LIST" | while IFS=$'\t' read -r NAME URL; do
            SAFE_NAME=$(echo "$NAME" | tr '/ ' '__')
            ZIP_NAME="ReSukiSU-${SAFE_NAME}(${{ env.KSU_VERSION }}).zip"
            echo "⬇️ Đang tải $NAME lưu thành $ZIP_NAME..."
            curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "$ZIP_NAME" "$URL"
            mkdir -p "manager-artifacts/$SAFE_NAME"
            unzip -o "$ZIP_NAME" -d "manager-artifacts/$SAFE_NAME"
            rm -rf "$ZIP_NAME"
          done

      - name: 📦 Tải SUSFS Module Trực Tiếp
        id: add_SUSFS
        continue-on-error: true
        run: |
          BUILD_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/workflows/build.yml/runs?status=success" | jq -r '.workflow_runs[0].id')
          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$BUILD_ID/artifacts")
          DOWNLOAD_URL=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].archive_download_url') 
          NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].name')
          
          echo "SUSFS_NAME=$NAME" >> $GITHUB_ENV
          NAME="susfs-$NAME.zip"
          
          echo "⬇️ Tải file Module $NAME..."
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "$NAME" "$DOWNLOAD_URL"
          echo "✅ Xong xuôi."
          
          mkdir -p susfs-module
          unzip "$NAME" -d susfs-temp
          cd susfs-temp
          if ls *.zip 1>/dev/null 2>&1; then mv *.zip ../susfs-module/; else zip -r "../susfs-module/ksu_module_susfs.zip" .; fi
          cd ..
          rm -rf susfs-temp "$NAME"

      - name: 🚨 Cảnh Báo Nếu Tải KSU Lỗi
        if: steps.add_KSU.outcome == 'failure'
        run: echo "❌ Toang! Lỗi down KSU từ CI rồi Dev Lỏ ơi!"

      - name: 📤 Push APK Lên Artifact Của Repo Mình
        if: steps.add_KSU.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU-Manager(${{ env.KSU_VERSION }})
          path: |
            **/*.apk

      - name: 📤 Push SUSFS Module Lên Artifact
        if: steps.add_SUSFS.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: susfs-${{ env.SUSFS_NAME }}
          path: ./susfs-module/*