# ========================================
# 🤖 WORKFLOW BUILD KERNEL ANDROID 14 (6.1)
# 👑 Việt hóa & Tối ưu bởi: p0s3id0n
# ========================================

name: 🤖 Build Kernel - Android 14 (6.1)

# ⚙️ Tương thích Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_branch:
        description: "🌿 Nhánh KSU (main/builtin hoặc điền SHA Hash, bỏ trống là lấy mặc định)"
        required: false
        type: string
        default: ""
      version:
        description: "🏷️ Tên Tùy Biến Phiên Bản (Nếu muốn)"
        required: false
        type: string
      build_time:
        description: "🕒 Ép Thời Gian Build (N hoặc trống = Dùng giờ UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        description: "🗜️ Bật Thuật Toán Nén ZRAM (LZ4KD)"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "🛡️ Bật Patch Chống Hard Brick Baseband (BBG)"
        required: true
        type: boolean
        default: false
      use_kpm:
        description: "🧩 Tích Hợp Module KPM"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "🔄 Bật Driver Re-Kernel"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "🛑 CẤM Dùng Tính Năng Ẩn Root SUSFS"
        required: true
        type: boolean
        default: false

  workflow_call:
    inputs:
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: boolean
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      called_from_main:
        description: "Biến môi trường nội bộ để không lặp việc lấy Manager"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a14-6-1:
    name: "🔨 6.1.${{ matrix.sub_level }} - Patch ${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "25"
            os_patch_level: "2023-10"
          - sub_level: "43"
            os_patch_level: "2023-11"
          - sub_level: "57"
            os_patch_level: "2024-01"
          - sub_level: "68"
            os_patch_level: "2024-03"
          - sub_level: "75"
            os_patch_level: "2024-05"
          - sub_level: "78"
            os_patch_level: "2024-06"
          - sub_level: "84"
            os_patch_level: "2024-07"
          - sub_level: "90"
            os_patch_level: "2024-08"
          - sub_level: "93"
            os_patch_level: "2024-09"
          - sub_level: "99"
            os_patch_level: "2024-10"
          - sub_level: "112"
            os_patch_level: "2024-11"
          - sub_level: "115"
            os_patch_level: "2024-12"
          - sub_level: "118"
            os_patch_level: "2025-01"
          - sub_level: "124"
            os_patch_level: "2025-02"
          - sub_level: "128"
            os_patch_level: "2025-03"
          - sub_level: "129"
            os_patch_level: "2025-04"
          - sub_level: "134"
            os_patch_level: "2025-05"
          - sub_level: "138"
            os_patch_level: "2025-06"
          - sub_level: "141"
            os_patch_level: "2025-07"
          - sub_level: "145"
            os_patch_level: "2025-09"
          - sub_level: "157"
            os_patch_level: "2025-12"
          - sub_level: "X"
            os_patch_level: "lts"
            
    # Gọi sang workflow build thực thi
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android14"
      kernel_version: "6.1"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: "ReSukiSU"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}

  # Job riêng kéo KSU & SUSFS về (chỉ chạy khi bấm Run tay file này)
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit