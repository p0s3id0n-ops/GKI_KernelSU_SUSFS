# ========================================
# 🚀 GKI KERNEL MAIN INITIATOR (FILE CHÍNH)
# 👑 Việt hóa & Tối ưu bởi: p0s3id0n
# ========================================

name: 🌟 Trung Tâm Khởi Chạy GKI Build

# ⚙️ Tương thích Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 🛡️ Ngăn chạy đè lên nhau, tự kill process cũ nếu bấm Build mới
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== Phân Phối ====================
      release_type:
        description: "🚀 Định Hình Dạng Phát Hành"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions

      # ==================== Biến KSU ====================
      kernelsu_branch:
        description: "🌿 Nhánh KSU (main/builtin/SHA Hash, bỏ trống lấy mặc định)"
        type: string
        default: ""
        required: false

      # ==================== Tùy Chọn Thêm ====================
      version:
        description: "🏷️ Phiên Bản Kernel Hiển Thị (Nếu muốn)"
        type: string
        default: ""
        required: false
      build_time:
        description: "🕒 Đóng Dấu Thời Gian (N/trống = Lấy giờ UTC Server)"
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
        required: false

      # ==================== Bảng Điều Khiển Tính Năng ====================
      use_zram:
        description: "🗜️ Kích Hoạt Module ZRAM Nén Nâng Cao"
        type: boolean
        default: false
      use_bbg:
        description: "🛡️ Mod Áo Giáp Chống Mất Baseband (BBG)"
        type: boolean
        default: false
      use_kpm:
        description: "🧩 Bật Nhúng KPM Framework"
        type: boolean
        default: false
      use_rekernel:
        description: "🔄 Bật Driver Ẩn Tàng (Re-Kernel)"
        type: boolean
        default: false
      cancel_susfs:
        description: "🛑 HUỶ Bỏ Tính Năng SUSFS (Root Trong Suốt)"
        type: boolean
        default: false

      # ==================== Công Tắc Build Các Phiên Bản ====================
      build_a12_5_10:
        description: "📱 Build cho Android 12 | Kernel 5.10"
        type: boolean
        default: false
      build_a13_5_15:
        description: "📱 Build cho Android 13 | Kernel 5.15"
        type: boolean
        default: false
      build_a14_6_1:
        description: "📱 Build cho Android 14 | Kernel 6.1"
        type: boolean
        default: false
      build_a15_6_6:
        description: "📱 Build cho Android 15 | Kernel 6.6"
        type: boolean
        default: false
      build_a16_6_12:
        description: "📱 Build cho Android 16 | Kernel 6.12"
        type: boolean
        default: false
      build_all:
        description: "🔥 QUẤT HẾT! Build toàn bộ mọi phiên bản!"
        type: boolean
        default: true

      # ==================== Nạp Đạn Cho TeleBot ====================
      commit:
        description: "💬 Điền Mã SHA Commit/Nội Dung (Cho Bot Tele)"
        type: string
        default: ""
        required: false
      change_log:
        description: "📜 Viết Nhật Ký Changelog (Hỗ trợ viết nhiều dòng)"
        type: string
        default: ""
        required: false

jobs:
  # ==================== Giai Đoạn 1: Gom Manager ====================
  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit

  # ==================== Giai Đoạn 2: Build Song Song ====================
  build-a12-5-10:
    if: inputs.build_a12_5_10 || inputs.build_all
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  build-a13-5-15:
    if: inputs.build_a13_5_15 || inputs.build_all
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  build-a14-6-1:
    if: inputs.build_a14_6_1 || inputs.build_all
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  build-a15-6-6:
    if: inputs.build_a15_6_6 || inputs.build_all
    uses: ./.github/workflows/kernel-a15-6-6.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  build-a16-6-12:
    if: inputs.build_a16_6_12 || inputs.build_all
    uses: ./.github/workflows/kernel-a16-6-12.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Giai Đoạn 3: Quét Rác .rej Gom Về 1 Chỗ ====================
  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12
    steps:
      - name: 📥 Tải Xuống File Artifacts Bị Reject
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: 🗂️ Đóng Gói Các Tệp Phân Loại Lỗi
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: 📤 Bắn File Lỗi ZIP Lên Cloud Cho Dev Debug
        uses: actions/upload-artifact@v6
        with:
          name: 🗂️ AIO-REJ-Loi-Gom-Lai
          path: AIO-REJ.zip
          if-no-files-found: ignore

  # ==================== Giai Đoạn 4: Đăng Release & Thông Báo Tele ====================
  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && github.repository == 'coolzyd9107/GKI_KernelSU_SUSFS' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: ⚙️ Cài Đặt Các Biến Tên Hiển Thị (Display Names)
        run: |
          KSU_NAME="ReSukiSU"
          echo "KSU_NAME=$KSU_NAME" >> $GITHUB_ENV

          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV

          echo "LZ4_STATUS=${{ inputs.use_zram && 'Bật ✅' || 'Tắt ❌' }}" >> $GITHUB_ENV
          echo "BBG_STATUS=${{ inputs.use_bbg && 'Đã Nhúng 🛡️' || 'Không ❌' }}" >> $GITHUB_ENV
          echo "KPM_LINE=${{ inputs.use_kpm && '-> KPM Sẵn Sàng 🧩' || '' }}" >> $GITHUB_ENV
          echo "LZ4_SUFFIX=${{ inputs.use_zram && '、LZ4KD' || '' }}" >> $GITHUB_ENV

          echo "HOOK_TYPE=-> SUSFS Inline Hooks" >> $GITHUB_ENV
          echo "MOUNT_TYPE=-> Magic Mount Supported 🗂️" >> $GITHUB_ENV
          echo "KSU_SUFFIX=" >> $GITHUB_ENV

          if [ -n "${{ inputs.kernelsu_branch }}" ]; then echo "BRANCH_INFO=(${{ inputs.kernelsu_branch }})" >> $GITHUB_ENV
          else echo "BRANCH_INFO=Bản Cứng (Stable)" >> $GITHUB_ENV; fi

          echo "RELEASE_NAME=🔥 GKI Kernel Custom by p0s3id0n: ${KSU_NAME}(${KSU_VER}) & SUSFS ${SUS_VER}" >> $GITHUB_ENV

      - name: 🛡️ Rà Soát Trạng Thái Các Luồng Build
        run: |
          failed=0
          check_build() {
            local selected="$1" job_name="$2" result="$3"
            if [[ "$selected" == "true" && "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ Ái chà, luồng $job_name nghẻo rồi! (KQ: $result)"
              failed=1
            fi
          }
          check_build "${{ inputs.build_a12_5_10 || inputs.build_all }}" "Android 12/5.10" "${{ needs.build-a12-5-10.result }}"
          check_build "${{ inputs.build_a13_5_15 || inputs.build_all }}" "Android 13/5.15" "${{ needs.build-a13-5-15.result }}"
          check_build "${{ inputs.build_a14_6_1 || inputs.build_all }}" "Android 14/6.1" "${{ needs.build-a14-6-1.result }}"
          check_build "${{ inputs.build_a15_6_6 || inputs.build_all }}" "Android 15/6.6" "${{ needs.build-a15-6-6.result }}"
          check_build "${{ inputs.build_a16_6_12 || inputs.build_all }}" "Android 16/6.12" "${{ needs.build-a16-6-12.result }}"
          [[ "$failed" -ne 0 ]] && exit 1 || true

      - name: 📥 Kéo Bộ Mã Nguồn Về Runner
        uses: actions/checkout@v6

      - name: 🎯 Lên Cấu Hình Nhánh KSU
        if: inputs.kernelsu_branch != ''
        run: |
          BRANCH="${{ inputs.kernelsu_branch }}"
          echo "KSU_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: 🔍 Check Commit Của ReSukiSU
        run: |
          REPO_URL="https://github.com/ReSukiSU/ReSukiSU.git"
          REPO_URL2="ReSukiSU/ReSukiSU"

          if [ -n "${{ inputs.kernelsu_branch }}" ]; then
            BRANCH_INPUT="${{ inputs.kernelsu_branch }}"
            if [[ "$BRANCH_INPUT" =~ ^[a-fA-F0-9]{40}$ ]]; then
              KSU_REF=$BRANCH_INPUT
              KSU_URL="https://github.com/$REPO_URL2/commit/$BRANCH_INPUT"
            else
              COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/$BRANCH_INPUT | awk '{ print $1 }')
              KSU_REF=$COMMIT_HASH
              KSU_URL="https://github.com/$REPO_URL2/commit/$COMMIT_HASH"
            fi
          else
            TAG=$(git ls-remote --tags --sort=-v:refname $REPO_URL | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1)
            KSU_REF=$TAG
            KSU_URL="https://github.com/$REPO_URL2/releases/tag/$TAG"
          fi

          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV

      - name: 🔍 Lấy Cây Commit SUSFS
        run: |
          GITLAB_OWNER="simonpunk"
          GITLAB_REPO="susfs4ksu"
          declare -A BRANCH_MAP=(
            ["gki_android12_5_10"]="gki-android12-5.10"
            ["gki_android13_5_15"]="gki-android13-5.15"
            ["gki_android14_6_1"]="gki-android14-6.1"
            ["gki_android15_6_6"]="gki-android15-6.6"
            ["gki_android16_6_12"]="gki-android16-6.12"
          )
          for var_name in "${!BRANCH_MAP[@]}"; do
            branch_name="${BRANCH_MAP[$var_name]}"
            COMMIT_HASH=$(git ls-remote https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO.git refs/heads/$branch_name | awk '{ print $1 }')
            if [[ -n "$COMMIT_HASH" ]]; then
              COMMIT_URL="https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO/-/commit/$COMMIT_HASH"
              echo "COMMIT_HASH_${var_name}=$COMMIT_HASH" >> "$GITHUB_ENV"
              echo "COMMIT_URL_${var_name}=$COMMIT_URL" >> "$GITHUB_ENV"
            fi
          done

      - name: 📜 Sinh Khung Tóm Tắt Release Tự Động
        run: |
          cat > release_body.md << EOF
          ## 📦 Chào mừng anh em! Bản Build Mới Lên Kệ

          **${{ env.KSU_NAME }}** + **SUSFS ${{ env.SUS_VER }}**${{ env.LZ4_SUFFIX }}
          *Được đóng gói tự động bởi tool do p0s3id0n config.*

          ### ✨ Đồ Chơi Gắn Kèm Lần Này

          | Món Đồ Chơi | Cấu Hình Kích Hoạt |
          |:---|:---|
          | 🥷 ${{ env.KSU_NAME }} | ${{ env.KSU_SUFFIX }}${env.BRANCH_INFO} |
          | 👻 SUSFS (Hệ ẩn mình) | Bản Update ඞ ${{ env.SUS_VER }} |
          | 🛡️ Khóa An Toàn BBG | Trạng thái: ${{ env.BBG_STATUS }} |
          | 🗜️ Tối ưu Nén (LZ4KD) | Trạng thái: ${{ env.LZ4_STATUS }} |
          | 🚀 Core LZ4 | v1.10.0 ${{ env.LZ4_STATUS }} |

          ${{ env.HOOK_TYPE }}
          ${{ env.MOUNT_TYPE }}
          ${{ env.KPM_LINE }} 

          > 💡 **Bonus Fix:** Lỗi dính Zero-width characters khi bị phát hiện Root [Unicode Bypass Fix](https://t.me/real5ec1cff/268) (Nhớ xài Xposed đính kèm).

          ### 📥 Món Không Thể Thiếu Khi Chơi:
          👉 Mod Module chuẩn chỉ ở đây: https://github.com/sidex15/ksu_module_susfs

          ---

          > [!IMPORTANT]
          > ### ⚠️ Tuyên Bố Miễn Trừ Cảnh Báo "Hard Brick" (Nói Ngắn Là Cẩn Thận)
          >
          > Vì anh em đang nghịch đồ Mod trực tiếp vào Kernel (vùng cấm của máy), chuyện rủi ro là bình thường:
          >
          > - 🔄 Treo Logo (Bootloop ngâm giấm).
          > - 🐛 Lỗi vặt, WiFi chập chờn, máy ngu đi.
          >
          > **Trước khi nhấn Flash, AE Dev Lỏ nhớ cho:**
          > 1. Backup file boot gốc (để có đường quay xe khẩn cấp).
          > 2. Lấy được log lỗi để nếu có die thì đi kêu cứu dễ hơn.

          <details>
          <summary>📋 Hướng Dẫn Ăn Ngay / Bị Hành Post-Flash</summary>

          #### ✅ Lên Ngon Lành Cành Đào:
          Xin chúc mừng, tận hưởng hệ thống trơn mượt với đặc quyền chúa tể (Root) ẩn mình! 🎉

          #### ❌ Treo Boot/ Lên Khóc Nấc:
          1. Flash lại Boot Stock từ fastboot hoặc TWRP lập tức.
          2. Vào lại OS tải App KernelSU manager, ấn lấy Kernel Log.
          3. Ném file log đấy lên mục [Issues](https://github.com/zzh20188/GKI_KernelSU_SUSFS/issues) để có ông thần nào cứu thì cứu.
          </details>

          ---
          <details>
          <summary>🔗 Rà Nguồn Các Code Tự Kéo</summary>
          **Core ReSukiSU**: [${{ env.KSU_REF }}](${{ env.KSU_URL }})

          **Mã SUSFS4KSU**:
          - gki-android12-5.10: [${{ env.COMMIT_HASH_gki_android12_5_10 }}](${{ env.COMMIT_URL_gki_android12_5_10 }})
          - gki-android13-5.15: [${{ env.COMMIT_HASH_gki_android13_5_15 }}](${{ env.COMMIT_URL_gki_android13_5_15 }})
          - gki-android14-6.1: [${{ env.COMMIT_HASH_gki_android14_6_1 }}](${{ env.COMMIT_URL_gki_android14_6_1 }})
          - gki-android15-6.6: [${{ env.COMMIT_HASH_gki_android15_6_6 }}](${{ env.COMMIT_URL_gki_android15_6_6 }})
          - gki-android16-6.12: [${{ env.COMMIT_HASH_gki_android16_6_12 }}](${{ env.COMMIT_URL_gki_android16_6_12 }})
          </details>

          ---
          **Tối Ưu Compile LTO**: Thin Mode

          📂 AE Cuộn xuống bấm vào **Assets** để quất file ZIP Kernel nhé! 👇
          EOF

      - name: 🏷️ Gắn Tag Mới Cho Nhánh Này
        run: |
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          if [ -z "$SUS_VERSION" ]; then
            echo "⚠️ Toang! Không móc được bản SUSFS, đành dùng ver mù 1.0.0"
            SUS_VERSION="1.0.0"
          fi

          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null | sed 's/-.*//' || echo "")

          if [ "$SUS_VERSION" = "$LATEST_TAG" ]; then
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          else
            LATEST_TAG="$SUS_VERSION-r0"
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

          git tag "$NEW_TAG"
          git push --tags

      - name: 📥 Down Gói Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      - name: 🚀 Quẩy GitHub Release Ngay Lập Tức
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then PRERELEASE_FLAG="--prerelease"; fi

          gh release create "$NEW_TAG" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_body.md \
            $PRERELEASE_FLAG

      - name: 📦 Up Cả KSU Manager & Mod SUSFS Lên Nhé
        continue-on-error: true
        run: |
          echo "Bơm App quản lý và Mod đi kèm..."
          apk_count=$(find ./downloaded-artifacts -type f -name "*.apk" | wc -l || true)
          sus_count=$(find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" | wc -l || true)
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | while IFS= read -r -d '' f; do gh release upload "$NEW_TAG" "$f" || true; done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | while IFS= read -r -d '' f; do gh release upload "$NEW_TAG" "$f" || true; done

      - name: 💾 Đẩy Luôn Quả Trái Tim Kernel Zip Vào Releases
        run: |
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            [[ "$file" == *-Rejects/* ]] && continue
            echo "🚀 Đang up file: $file..."
            gh release upload "$NEW_TAG" "$file"
          done

      - name: 📋 Điểm Báo Summary Cuối Phiên
        run: |
          echo "## 🎉 Lên Dĩa Ngon Lành Nhé Dev!" >> $GITHUB_STEP_SUMMARY
          echo "- **Tên Mác (Tag)**: $NEW_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Độ Chín**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Chạy Bàn (Link)**: https://github.com/$REPO_OWNER/$REPO_NAME/releases/tag/$NEW_TAG" >> $GITHUB_STEP_SUMMARY

      - name: 🤖 Gọi Bot Tele Thông Báo Bản Build Mới (Cho Channel)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          set -euo pipefail
          INPUT_COMMIT="${{ inputs.commit }}"
          INPUT_CHANGE_LOG="${{ inputs.change_log }}"

          TEXT=$(cat <<EOF
          🚀 <b>Bản GKI Kernel Mới Mới Ra Lò Từ Lò Độ Của p0s3id0n!</b>
          
          🌿 Nhánh Nguồn: <code>${{ github.ref_name }}</code>
          💬 Commit/Patch: ${INPUT_COMMIT}
          🏷️ Mác Phiên Bản: <code>${NEW_TAG}</code>
          
          🛠️ Đồ Chơi Kèm Theo: 
          <pre>🥷 Nhúng ReSukiSU = Vâng, Quất Luôn!
          👻 Mod Ẩn SUSFS = ${{ inputs.cancel_susfs && 'Bỏ' || 'Còn' }}
          🛡️ Giáp Mạng BBG = ${{ inputs.use_bbg && 'Mặc' || 'Cởi' }}
          🗜️ Nén LZ4KD = ${{ inputs.use_zram && 'Bật' || 'Tắt' }}
          🧩 Chơi KPM = ${{ inputs.use_kpm && 'Quất' || 'Bỏ Qua' }}
          🔜 Hỗ trợ KPatch-Next = Mặc định sẵn rồi!</pre>
          
          📜 Lời Bình Từ Cha Đẻ Của Bản Build Này: 
          <pre>${INPUT_CHANGE_LOG}</pre>
          
